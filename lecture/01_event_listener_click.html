<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Counter</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="flex p-6">
        <div id="button" class="p-6 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Click me</div>
        <div id="counter" class="m-4 text-2xl font-bold">0</div>
    </div>

    <script>
        const btn = document.querySelector('#button')
        const display = document.querySelector('#counter')

        function increaseValue() {
            display.innerText = Number(display.innerText) + 1
        }
        btn.addEventListener('click', increaseValue)
    </script>

</body>
</html>
